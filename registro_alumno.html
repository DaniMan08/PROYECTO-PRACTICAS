<!-- contenido -->
<main class="contenido">

    <h2>Registrar Alumno</h2>

    <div class="contenido-flex registro-flex">

        <!-- formulario -->
        <div class="contenedor-formulario">

            <!-- Formulario Alumnos -->
            <form action="http://localhost/FFE_PRACTICAS/PROYECTO-PRACTICAS/php/guardar_alumno.php" method="POST">
               
                <div class="bloque">
                    <h3><i class="fas fa-user"></i>Alumnos</h3>

               <div class="caja-input">
                    <label>Nombre</label>
                    <input type="text" name="nombre" placeholder="Nombre">
                </div>

                <div class="caja-input">
                    <label>Apellidos</label>
                    <input type="text" name="apellidos" placeholder="Apellidos">
                </div>

                <div class="caja-input">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="usuario@dominio.com">
                </div>

                <div class="caja-input">
                    <label>Teléfono</label>
                    <input type="tel" name="telefono" placeholder="91 222 22 22">
                </div>

                <div class="caja-input">
                    <label>Fecha alta</label>
                    <input type="date" name="fecha_alta">
                </div>

                <div class="caja-input">
                    <label>Estado</label>
                    <select name="estado">
                        <option value="activo">Activo</option>
                        <option value="inactivo">Inactivo</option>
                    </select>
                </div>

                      <!-- botón -->
                    <button type="submit" class="boton-enviar">
                        Registrar alumno
                    </button>

                </div>
            </form>      

        </div>

    </div>

</main>
