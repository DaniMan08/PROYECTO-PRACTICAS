                <div class="panel-filtros">

                            <option>Colectivo</option>
                        </select>
                    </div>
                    
                    <!-- canal -->
                    <div class="filtro-grupo">
                        <label>Canal</label>
                        <select class="filtro-select">
                            <option>Email</option>
                            <option>WhatsApp</option>
                        </select>

                    <!-- botón aplicar -->
                    <button class="boton-aplicar">

                    </button>
                </div>
            </div>
